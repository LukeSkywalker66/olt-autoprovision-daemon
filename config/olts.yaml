# =============================================================================
# OLT Auto-Provision Daemon — Multi-OLT Configuration (YAML-First)
# =============================================================================
# Cada OLT se indexa por su IP (la misma que llega como src_ip en el paquete UDP).
# Las claves definidas en una entrada de OLT sobrescriben los defaults globales.
# Solo es obligatorio especificar: name, ssh_user, ssh_pass.
# =============================================================================

defaults:
  # --- Listener ---
  syslog_port: 514               # Puerto UDP de escucha (514 requiere root/CAP_NET_BIND_SERVICE)
  parser_model: "huawei_ma5800"   # Modelo de parser a utilizar

  # --- SSH Connection ---
  ssh_port: 22                    # Puerto SSH de la OLT

  # --- Provisioning Parameters — Gestión (gemport 2, obligatorio) ---
  management_vlan: 150            # VLAN de gestión para WAN DHCP
  gemport: 2                      # GEM Port para service-port de gestión
  traffic_table_up: "0"           # Traffic table inbound (índice o nombre)
  traffic_table_down: "0"         # Traffic table outbound (índice o nombre)
  tr069_profile_id: 1             # TR-069 server profile ID
  dhcp_priority: 2                # Prioridad 802.1p para WAN DHCP
  ip_index: 0                     # IP index para ont ipconfig

  # --- Provisioning Parameters — Internet (gemport 1, opcional) ---
  # Descomentar internet_vlan para habilitar service-port de internet:
  # internet_vlan: 600            # VLAN de datos/internet (gemport 1)
  # internet_gemport: 1           # GEM port para internet (default: 1)
  # internet_traffic_table_up: "7"   # Traffic table inbound para internet
  # internet_traffic_table_down: "7" # Traffic table outbound para internet

  # --- Operational Tuning ---
  cmd_delay: 0.4                  # Delay entre comandos SSH (segundos)
  max_retries: 10                 # Reintentos por comando ante OLT ocupada
  dedup_ttl_seconds: 300          # TTL del caché de deduplicación (5 minutos)

olts:

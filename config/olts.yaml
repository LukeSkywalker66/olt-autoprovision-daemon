    ssh_pass: "2Finternet2026!"
    ssh_port: 27122
    internet_vlan: 600            # Service-port internet (gemport 1)
    internet_gemport: 1
    internet_traffic_table_up: "7"
    internet_traffic_table_down: "7"

  # -------------------------------------------------------------------
